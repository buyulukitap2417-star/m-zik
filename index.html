<!DOCTYPE html>
<html lang="tr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Youtipy - Müziğin Ritmi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <!-- Lucide İkonları için güncel script -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            transition: background-color 0.5s ease;
            margin: 0;
            padding: 0;
        }

        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .light .glass {
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .hide { display: none !important; }
        
        #player-bar {
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #player-bar.active { transform: translateY(0); }

        @keyframes modalShow {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        .animate-modal {
            animation: modalShow 0.3s ease-out forwards;
        }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(99, 102, 241, 0.3); border-radius: 10px; }
    </style>
</head>
<body class="bg-neutral-950 text-white overflow-hidden">

    <!-- Dinamik Arka Plan -->
    <div class="fixed inset-0 bg-gradient-to-br from-indigo-900/20 via-black to-purple-900/20 -z-10"></div>

    <!-- 1. GİRİŞ EKRANI (Varsayılan olarak görünür) -->
    <div id="auth-screen" class="fixed inset-0 z-[100] w-full h-full flex items-center justify-center p-4 bg-neutral-950/80 backdrop-blur-sm">
        <div class="glass max-w-md w-full p-8 rounded-[2.5rem] shadow-2xl animate-modal">
            <div class="flex flex-col items-center mb-8">
                <div class="w-16 h-16 bg-gradient-to-br from-indigo-600 to-purple-600 rounded-2xl flex items-center justify-center mb-4 shadow-xl">
                    <i data-lucide="music" class="text-white w-8 h-8"></i>
                </div>
                <h1 class="text-3xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-indigo-400 to-purple-400">Youtipy</h1>
                <p class="text-neutral-400 text-sm mt-2">Müziğe erişmek için oturum açın</p>
            </div>

            <form id="auth-form" class="space-y-4">
                <div class="space-y-1">
                    <label class="text-xs font-bold text-neutral-500 uppercase ml-2">E-POSTA</label>
                    <input type="email" id="email" required class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 outline-none focus:ring-2 focus:ring-indigo-500 transition-all text-white" placeholder="ornek@email.com">
                </div>
                <div class="space-y-1">
                    <label class="text-xs font-bold text-neutral-500 uppercase ml-2">ŞİFRE</label>
                    <input type="password" id="password" required class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 outline-none focus:ring-2 focus:ring-indigo-500 transition-all text-white" placeholder="••••••••">
                </div>
                <button type="submit" id="auth-submit-btn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-2xl transition-all active:scale-95 shadow-lg shadow-indigo-600/20">
                    Giriş Yap
                </button>
            </form>

            <div class="mt-6 text-center">
                <button id="toggle-auth" class="text-indigo-400 text-sm font-medium hover:underline">
                    Hesabın yok mu? Kayıt Ol
                </button>
            </div>
        </div>
    </div>

    <!-- 2. ANA UYGULAMA (Varsayılan olarak gizli) -->
    <div id="app-screen" class="h-screen flex flex-col hide">
        
        <header class="h-20 glass flex items-center justify-between px-8 z-50">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center">
                    <i data-lucide="music-2" class="text-white w-6 h-6"></i>
                </div>
                <span class="text-xl font-black tracking-tighter">YOUTIPY</span>
            </div>

            <div class="flex-1 max-w-xl mx-8 relative group">
                <input type="text" id="search-input" placeholder="Şarkı, sanatçı veya albüm ara..." 
                    class="w-full bg-white/5 border border-white/10 rounded-full py-2.5 px-12 outline-none focus:ring-2 focus:ring-indigo-500 transition-all text-white">
                <i data-lucide="search" class="absolute left-4 top-3 text-neutral-500 w-5 h-5"></i>
            </div>

            <div class="flex items-center gap-4">
                <button id="theme-toggle" class="p-2.5 rounded-full hover:bg-white/10 transition-colors">
                    <i data-lucide="sun" id="theme-icon"></i>
                </button>
                <div class="flex items-center gap-3 bg-white/5 p-1.5 pr-4 rounded-full border border-white/10">
                    <div class="w-8 h-8 bg-indigo-500 rounded-full flex items-center justify-center text-xs font-bold" id="user-initial">?</div>
                    <span class="text-sm font-medium hidden sm:inline" id="user-email">...</span>
                    <button id="logout-btn" class="ml-2 text-neutral-400 hover:text-red-500"><i data-lucide="log-out" class="w-4 h-4"></i></button>
                </div>
            </div>
        </header>

        <div class="flex flex-1 overflow-hidden">
            <!-- Yan Menü -->
            <aside class="w-64 glass border-r border-white/10 p-6 flex flex-col gap-8">
                <div class="space-y-2">
                    <p class="text-[10px] font-bold text-neutral-500 uppercase tracking-widest px-4">Kütüphane</p>
                    <nav class="space-y-1">
                        <button id="nav-home" onclick="changeTab('home')" class="nav-link w-full flex items-center gap-3 p-3 rounded-xl text-sm font-semibold transition-all bg-indigo-600 text-white">
                            <i data-lucide="zap" class="w-5 h-5"></i> Keşfet
                        </button>
                        <button id="nav-pro" onclick="changeTab('pro')" class="nav-link w-full flex items-center justify-between p-3 rounded-xl text-sm font-semibold transition-all hover:bg-white/5">
                            <div class="flex items-center gap-3"><i data-lucide="crown" class="w-5 h-5"></i> Pro Sürüm</div>
                            <span id="pro-badge" class="hide text-[10px] bg-yellow-500 text-black px-1.5 py-0.5 rounded font-bold">AKTİF</span>
                        </button>
                    </nav>
                </div>
            </aside>

            <!-- Ana İçerik Alanı -->
            <main id="main-content" class="flex-1 overflow-y-auto p-8 pb-32">
                <!-- Keşfet -->
                <section id="tab-home" class="space-y-8">
                    <div>
                        <h2 class="text-3xl font-extrabold">Senin İçin Seçtiklerimiz</h2>
                        <p class="text-neutral-400 text-sm">Günün popüler parçaları</p>
                    </div>
                    <div id="music-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5 gap-6"></div>
                </section>

                <!-- Pro Paneli -->
                <section id="tab-pro" class="hide max-w-3xl mx-auto py-12 text-center space-y-12">
                    <div class="space-y-4">
                        <div class="w-20 h-20 bg-yellow-500/10 text-yellow-500 rounded-[2rem] flex items-center justify-center mx-auto border border-yellow-500/20">
                            <i data-lucide="crown" class="w-10 h-10"></i>
                        </div>
                        <h2 class="text-4xl font-black">Youtipy Pro</h2>
                        <p class="text-neutral-400">Tüm kısıtlamaları kaldırın.</p>
                    </div>

                    <div id="pro-activation-box" class="glass p-10 rounded-[3rem] space-y-6">
                        <h3 class="text-xl font-bold">Aktivasyon Kodu</h3>
                        <div class="flex flex-col sm:flex-row gap-4 justify-center">
                            <input type="text" id="pro-code-input" placeholder="Kod: ProTipy" 
                                class="bg-white/5 border border-white/20 rounded-2xl px-6 py-3 outline-none focus:ring-2 focus:ring-yellow-500 text-white">
                            <button onclick="handleProActivation()" class="bg-yellow-500 hover:bg-yellow-600 text-black font-bold px-8 py-3 rounded-2xl transition-all shadow-xl shadow-yellow-500/20">
                                Aktif Et
                            </button>
                        </div>
                    </div>
                </section>
            </main>
        </div>

        <!-- Müzik Barı -->
        <div id="player-bar" class="fixed bottom-0 left-0 right-0 h-24 glass border-t border-white/10 px-8 flex items-center justify-between z-50">
            <div class="flex items-center gap-4 w-1/3">
                <img id="current-thumb" src="" class="w-14 h-14 rounded-xl object-cover shadow-lg hide" alt="">
                <div class="overflow-hidden">
                    <h4 id="current-title" class="text-sm font-bold truncate">Şarkı Seçilmedi</h4>
                    <p id="current-artist" class="text-xs text-neutral-500 truncate">Sanatçı</p>
                </div>
            </div>

            <div class="flex flex-col items-center gap-2 w-1/3">
                <div class="flex items-center gap-6">
                    <button class="text-neutral-500 hover:text-white"><i data-lucide="skip-back"></i></button>
                    <button onclick="togglePlay()" id="play-btn" class="w-12 h-12 bg-white text-black rounded-full flex items-center justify-center hover:scale-110 transition-transform">
                        <i data-lucide="play" fill="black"></i>
                    </button>
                    <button class="text-neutral-500 hover:text-white"><i data-lucide="skip-forward"></i></button>
                </div>
            </div>

            <div class="flex items-center justify-end gap-4 w-1/3">
                <i data-lucide="volume-2" class="text-neutral-500"></i>
                <div class="w-24 h-1 bg-white/20 rounded-full"></div>
            </div>
            <div id="youtube-player-container" class="hide"></div>
        </div>
    </div>

    <!-- 3. KUTLAMA MODALI -->
    <div id="celebration-modal" class="fixed inset-0 z-[200] flex items-center justify-center p-4 hide">
        <div class="absolute inset-0 bg-black/80 backdrop-blur-md"></div>
        <div class="relative glass border-4 border-yellow-500 p-12 rounded-[3rem] text-center space-y-6 animate-modal">
            <div class="w-24 h-24 bg-yellow-500 rounded-full flex items-center justify-center mx-auto shadow-2xl">
                <i data-lucide="crown" class="text-black w-12 h-12"></i>
            </div>
            <h2 class="text-5xl font-black italic">TEBRİKLER!</h2>
            <p class="text-xl">Artık bir <b>Youtipy Pro</b> üyesisin.</p>
            <button onclick="closeCelebration()" class="bg-white text-black font-bold px-10 py-3 rounded-2xl hover:bg-neutral-200 transition-colors">
                Harika!
            </button>
        </div>
    </div>

    <script>
        // --- CONFIG ---
        const YT_API_KEY = "AIzaSyAx4sh2SFKsXVhemr_cVlGpWpfAPaF6IeA";
        const SB_URL = "https://eygvzptaynyysagvgwyh.supabase.co";
        const SB_KEY = "sb_publishable_JixS3C4jQ2Znrgcr3-IZPg_1MfpvdXW";
        const PRO_CODE = "ProTipy";

        const supabaseClient = window.supabase.createClient(SB_URL, SB_KEY);
        
        let currentUser = null;
        let isPro = false;
        let isPlaying = false;
        let currentVideoId = "";
        let isLoginMode = true;

        // Başlangıçta ikonları oluştur
        window.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            checkAuth();
        });

        async function checkAuth() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                onLoginSuccess(session.user);
            }
        }

        document.getElementById('toggle-auth').onclick = () => {
            isLoginMode = !isLoginMode;
            document.getElementById('auth-submit-btn').innerText = isLoginMode ? "Giriş Yap" : "Kayıt Ol";
            document.getElementById('toggle-auth').innerText = isLoginMode ? "Hesabın yok mu? Kayıt Ol" : "Zaten hesabın var mı? Giriş Yap";
        };

        document.getElementById('auth-form').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            try {
                const result = isLoginMode 
                    ? await supabaseClient.auth.signInWithPassword({ email, password })
                    : await supabaseClient.auth.signUp({ email, password });
                if (result.error) throw result.error;
                onLoginSuccess(result.data.user);
            } catch (err) {
                alert("Hata: " + err.message);
            }
        };

        async function onLoginSuccess(user) {
            currentUser = user;
            document.getElementById('auth-screen').classList.add('hide');
            document.getElementById('app-screen').classList.remove('hide');
            document.getElementById('user-email').innerText = user.email;
            document.getElementById('user-initial').innerText = user.email[0].toUpperCase();
            
            checkProInDB(user.id);
            fetchInitialMusic();
            setTimeout(() => lucide.createIcons(), 100);
        }

        document.getElementById('logout-btn').onclick = async () => {
            await supabaseClient.auth.signOut();
            window.location.reload();
        };

        async function checkProInDB(userId) {
            try {
                const { data } = await supabaseClient.from('profiles').select('is_pro').eq('id', userId).single();
                if (data?.is_pro) setProUI(true);
            } catch (e) {}
        }

        async function handleProActivation() {
            const input = document.getElementById('pro-code-input').value;
            if (input === PRO_CODE) {
                await supabaseClient.from('profiles').upsert({ id: currentUser.id, is_pro: true });
                setProUI(true);
                showCelebration();
            } else {
                alert("Geçersiz Kod!");
            }
        }

        function setProUI(active) {
            isPro = active;
            if (active) {
                document.getElementById('pro-badge').classList.remove('hide');
                document.getElementById('pro-activation-box').innerHTML = `
                    <div class="text-green-500 font-bold text-xl flex flex-col items-center gap-2">
                        <i data-lucide="check-circle" class="w-12 h-12"></i>
                        <span>Pro Üyelik Aktif</span>
                    </div>`;
                lucide.createIcons();
            }
        }

        function showCelebration() {
            document.getElementById('celebration-modal').classList.remove('hide');
            confetti({ 
                particleCount: 150, 
                spread: 70, 
                origin: { y: 0.6 }, 
                colors: ['#EAB308', '#6366F1', '#FFFFFF'],
                zIndex: 300
            });
            lucide.createIcons();
        }

        window.closeCelebration = () => {
            document.getElementById('celebration-modal').classList.add('hide');
        };

        async function fetchInitialMusic() {
            searchMusic("Popular Songs 2024", 5);
        }

        document.getElementById('search-input').onkeypress = (e) => {
            if (e.key === 'Enter') searchMusic(e.target.value);
        };

        async function searchMusic(query, limit = 15) {
            const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=${limit}&q=${encodeURIComponent(query)}&type=video&key=${YT_API_KEY}`;
            try {
                const res = await fetch(url);
                const data = await res.json();
                renderSongs(data.items);
            } catch (err) {}
        }

        function renderSongs(songs) {
            const grid = document.getElementById('music-grid');
            if (!songs) return;
            grid.innerHTML = songs.map(song => `
                <div class="group relative glass p-4 rounded-[2rem] cursor-pointer transition-all hover:translate-y-[-5px] hover:bg-white/10" 
                     onclick="playSong('${song.id.videoId}', '${song.snippet.title.replace(/'/g, "\\'")}', '${song.snippet.thumbnails.high.url}', '${song.snippet.channelTitle}')">
                    <div class="aspect-square rounded-2xl overflow-hidden mb-4 shadow-lg relative">
                        <img src="${song.snippet.thumbnails.high.url}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500">
                        <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center backdrop-blur-sm">
                            <div class="w-12 h-12 bg-indigo-600 rounded-full flex items-center justify-center shadow-xl"><i data-lucide="play" fill="white"></i></div>
                        </div>
                    </div>
                    <h4 class="text-sm font-bold truncate">${song.snippet.title}</h4>
                    <p class="text-[10px] text-neutral-500 truncate mt-1">${song.snippet.channelTitle}</p>
                </div>`).join('');
            lucide.createIcons();
        }

        function playSong(id, title, thumb, artist) {
            currentVideoId = id;
            document.getElementById('player-bar').classList.add('active');
            const thumbImg = document.getElementById('current-thumb');
            thumbImg.src = thumb;
            thumbImg.classList.remove('hide');
            document.getElementById('current-title').innerText = title;
            document.getElementById('current-artist').innerText = artist;
            document.getElementById('youtube-player-container').innerHTML = `<iframe width="0" height="0" src="https://www.youtube.com/embed/${id}?autoplay=1" frameborder="0" allow="autoplay"></iframe>`;
            isPlaying = true;
            updatePlayBtn();
        }

        function togglePlay() {
            if (!currentVideoId) return;
            isPlaying = !isPlaying;
            if (!isPlaying) document.getElementById('youtube-player-container').innerHTML = '';
            else playSong(currentVideoId, document.getElementById('current-title').innerText, document.getElementById('current-thumb').src, document.getElementById('current-artist').innerText);
            updatePlayBtn();
        }

        function updatePlayBtn() {
            const btn = document.getElementById('play-btn');
            btn.innerHTML = isPlaying ? `<i data-lucide="pause" fill="black"></i>` : `<i data-lucide="play" fill="black"></i>`;
            lucide.createIcons();
        }

        window.changeTab = (tab) => {
            document.querySelectorAll('section').forEach(s => s.classList.add('hide'));
            document.getElementById(`tab-${tab}`).classList.remove('hide');
            document.querySelectorAll('.nav-link').forEach(l => {
                l.classList.remove('bg-indigo-600', 'text-white');
                l.classList.add('hover:bg-white/5');
            });
            document.getElementById(`nav-${tab}`).classList.add('bg-indigo-600', 'text-white');
            document.getElementById(`nav-${tab}`).classList.remove('hover:bg-white/5');
            lucide.createIcons();
        };

        document.getElementById('theme-toggle').onclick = () => {
            const isDark = document.documentElement.classList.toggle('light');
            document.body.classList.toggle('light');
            const icon = document.getElementById('theme-icon');
            icon.setAttribute('data-lucide', isDark ? 'moon' : 'sun');
            lucide.createIcons();
        };
    </script>
</body>
</html>
